<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Moved</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #0a0f1c, #02040a);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  overflow: hidden;
}

/* Glow background */
body::before {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: rgba(0, 150, 255, 0.3);
  filter: blur(120px);
  top: 10%;
  left: 50%;
  transform: translateX(-50%);
}

/* Card */
.card {
  width: 90%;
  max-width: 420px;
  padding: 30px 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  text-align: center;
  animation: fadeUp 0.6s ease;
}

/* Title */
h1 {
  font-size: 22px;
  margin-bottom: 10px;
}

/* Highlight URL */
.new-url {
  margin: 15px 0;
  font-size: 14px;
  color: #7fdcff;
  word-break: break-all;
}

/* Button */
.btn {
  margin-top: 20px;
  padding: 12px 20px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(135deg, #00c6ff, #7b61ff);
  color: white;
  font-size: 14px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(123, 97, 255, 0.6);
}

/* Small text */
.note {
  margin-top: 12px;
  font-size: 12px;
  opacity: 0.7;
}

/* Animation */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="card">
  <h1>🚀 Website Updated</h1>
  
  <p>We have moved to a new and improved platform.</p>
  
  <div class="new-url">
    https://nexttopper-feed.pages.dev/
  </div>

  <button class="btn" onclick="goToNew()">
    Go to New Website →
  </button>

  <div class="note">
    You will be redirected automatically in <span id="count">5</span> seconds
  </div>
</div>

<script>
function goToNew() {
  window.location.href = "https://nexttopper-feed.pages.dev/";
}

// Auto redirect countdown
let time = 5;
let counter = document.getElementById("count");

let interval = setInterval(() => {
  time--;
  counter.textContent = time;

  if (time <= 0) {
    clearInterval(interval);
    goToNew();
  }
}, 1000);
</script>

</body>
</html>
